<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1A10"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <linearGradient id="coinFace" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F5D070"/>
      <stop offset="35%" stop-color="#E0A830"/>
      <stop offset="65%" stop-color="#C8922A"/>
      <stop offset="100%" stop-color="#A87020"/>
    </linearGradient>
    <linearGradient id="coinEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A87020"/>
      <stop offset="100%" stop-color="#7A5010"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect x="3.5" y="3.5" width="93" height="93" rx="19" fill="none" stroke="rgba(200,146,42,0.2)" stroke-width="1"/>

  <!-- Coin thick edge (3D depth) -->
  <ellipse cx="50" cy="53" rx="33" ry="33" fill="url(#coinEdge)" filter="url(#shadow)"/>

  <!-- Coin face -->
  <ellipse cx="50" cy="50" rx="33" ry="33" fill="url(#coinFace)"/>

  <!-- Coin rim -->
  <ellipse cx="50" cy="50" rx="33" ry="33" fill="none" stroke="#A87020" stroke-width="2.5"/>

  <!-- Inner rim detail -->
  <ellipse cx="50" cy="50" rx="29" ry="29" fill="none" stroke="rgba(160,110,20,0.5)" stroke-width="1"/>

  <!-- Reeded edge marks (tick marks around coin) -->
  <g stroke="#A87020" stroke-width="1.2" opacity="0.6">
    <line x1="50" y1="17.5" x2="50" y2="20.5"/>
    <line x1="58.1" y1="18.3" x2="57.2" y2="21.2"/>
    <line x1="65.5" y1="21.5" x2="63.8" y2="23.9"/>
    <line x1="71.5" y1="26.7" x2="69.3" y2="28.5"/>
    <line x1="75.7" y1="33.5" x2="73.1" y2="34.7"/>
    <line x1="78" y1="41.3" x2="75.1" y2="41.9"/>
    <line x1="78" y1="50" x2="75" y2="50"/>
    <line x1="78" y1="58.7" x2="75.1" y2="58.1"/>
    <line x1="75.7" y1="66.5" x2="73.1" y2="65.3"/>
    <line x1="71.5" y1="73.3" x2="69.3" y2="71.5"/>
    <line x1="65.5" y1="78.5" x2="63.8" y2="76.1"/>
    <line x1="58.1" y1="81.7" x2="57.2" y2="78.8"/>
    <line x1="50" y1="82.5" x2="50" y2="79.5"/>
    <line x1="41.9" y1="81.7" x2="42.8" y2="78.8"/>
    <line x1="34.5" y1="78.5" x2="36.2" y2="76.1"/>
    <line x1="28.5" y1="73.3" x2="30.7" y2="71.5"/>
    <line x1="24.3" y1="66.5" x2="26.9" y2="65.3"/>
    <line x1="22" y1="58.7" x2="24.9" y2="58.1"/>
    <line x1="22" y1="50" x2="25" y2="50"/>
    <line x1="22" y1="41.3" x2="24.9" y2="41.9"/>
    <line x1="24.3" y1="33.5" x2="26.9" y2="34.7"/>
    <line x1="28.5" y1="26.7" x2="30.7" y2="28.5"/>
    <line x1="34.5" y1="21.5" x2="36.2" y2="23.9"/>
    <line x1="41.9" y1="18.3" x2="42.8" y2="21.2"/>
  </g>

  <!-- V letter -->
  <text x="50" y="60"
    font-family="Georgia, serif"
    font-size="34"
    font-weight="bold"
    text-anchor="middle"
    fill="#7A5010"
    opacity="0.25"
    letter-spacing="-1">V</text>
  <text x="50" y="60"
    font-family="Georgia, serif"
    font-size="34"
    font-weight="bold"
    text-anchor="middle"
    fill="#3A2008"
    opacity="0.18"
    letter-spacing="-1">V</text>
  <text x="50" y="59"
    font-family="Georgia, serif"
    font-size="34"
    font-weight="bold"
    text-anchor="middle"
    fill="#1C0E00"
    opacity="0.55"
    letter-spacing="-1">V</text>

  <!-- Sheen highlight -->
  <ellipse cx="42" cy="38" rx="16" ry="10" fill="url(#sheen)" transform="rotate(-30,42,38)"/>
</svg>
